<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC257"/>
      <stop offset="100%" stop-color="#F59E1F"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB454" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FFB454" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1E2B" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0B0D14"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- wordmark -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="28" height="28" rx="6" fill="url(#chip)"/>
    <g fill="#0B0D14" opacity="0.45">
      <rect x="4" y="4" width="6" height="6" rx="1"/>
      <rect x="11" y="4" width="6" height="6" rx="1"/>
      <rect x="18" y="4" width="6" height="6" rx="1"/>
      <rect x="4" y="11" width="6" height="6" rx="1"/>
      <rect x="11" y="11" width="6" height="6" rx="1"/>
      <rect x="18" y="11" width="6" height="6" rx="1"/>
      <rect x="4" y="18" width="6" height="6" rx="1"/>
      <rect x="11" y="18" width="6" height="6" rx="1"/>
      <rect x="18" y="18" width="6" height="6" rx="1"/>
    </g>
    <text x="38" y="20" font-family="JetBrains Mono, monospace" font-size="17" font-weight="700" fill="#F4F5F7">keyhold</text>
  </g>

  <!-- eyebrow -->
  <text x="64" y="200" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="2" fill="#FFB454">$ AUTH-SYSTEM --STATUS</text>

  <!-- headline -->
  <text x="62" y="270" font-family="JetBrains Mono, monospace" font-size="56" font-weight="700" fill="#F4F5F7">Auth, done</text>
  <text x="62" y="336" font-family="JetBrains Mono, monospace" font-size="56" font-weight="700" fill="#F4F5F7">properly.</text>

  <!-- subhead -->
  <text x="64" y="392" font-family="Inter, sans-serif" font-size="17" fill="#9AA1B2">Rotating refresh tokens, RBAC, rate limiting</text>
  <text x="64" y="418" font-family="Inter, sans-serif" font-size="17" fill="#9AA1B2">and cookies that don't leak — end to end.</text>

  <!-- tech row -->
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#6B7186">
    <text x="64" y="480">TypeScript</text>
    <text x="176" y="480">·</text>
    <text x="192" y="480">React</text>
    <text x="256" y="480">·</text>
    <text x="272" y="480">Express</text>
    <text x="356" y="480">·</text>
    <text x="372" y="480">PostgreSQL</text>
    <text x="486" y="480">·</text>
    <text x="502" y="480">Prisma</text>
  </g>

  <!-- keycard panel -->
  <g transform="translate(700,140)">
    <rect x="-40" y="-20" width="460" height="400" fill="url(#glow)"/>
    <rect x="0" y="0" width="380" height="330" rx="20" fill="#12151F" stroke="#252939" stroke-width="1.5"/>

    <!-- chip -->
    <rect x="32" y="32" width="40" height="32" rx="6" fill="url(#chip)"/>
    <g fill="#12151F" opacity="0.4">
      <rect x="37" y="37" width="8" height="8" rx="1"/>
      <rect x="48" y="37" width="8" height="8" rx="1"/>
      <rect x="59" y="37" width="8" height="8" rx="1"/>
      <rect x="37" y="48" width="8" height="8" rx="1"/>
      <rect x="48" y="48" width="8" height="8" rx="1"/>
      <rect x="59" y="48" width="8" height="8" rx="1"/>
    </g>
    <text x="84" y="45" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#6B7186">SESSION</text>
    <text x="84" y="59" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#6B7186">KEYCARD</text>

    <!-- LED -->
    <circle cx="336" cy="40" r="5" fill="#5EEAD4"/>
    <text x="300" y="44" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#5EEAD4">LIVE</text>

    <!-- user line -->
    <text x="32" y="128" font-family="JetBrains Mono, monospace" font-size="16" fill="#E4E6EB">ada@keyhold.dev</text>
    <text x="32" y="152" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2" fill="#4B5166">•••• •••• •••• 4f21</text>

    <!-- divider -->
    <line x1="32" y1="188" x2="348" y2="188" stroke="#252939" stroke-width="1"/>

    <!-- lifecycle -->
    <g font-family="JetBrains Mono, monospace" font-size="12">
      <text x="32" y="220" fill="#FFB454" letter-spacing="1.5">ISSUED</text>
      <text x="348" y="220" text-anchor="end" fill="#4B5166">access token · 15m ttl</text>

      <text x="32" y="252" fill="#FFB454" letter-spacing="1.5">VERIFIED</text>
      <text x="348" y="252" text-anchor="end" fill="#4B5166">signature checked</text>

      <text x="32" y="284" fill="#FFB454" letter-spacing="1.5">ROTATED</text>
      <text x="348" y="284" text-anchor="end" fill="#4B5166">refresh token replaced</text>
    </g>
  </g>
</svg>
