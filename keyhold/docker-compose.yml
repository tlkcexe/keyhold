services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_system
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_system?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me_please_1234}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me_please_1234}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      COOKIE_SECRET: ${COOKIE_SECRET:-dev_cookie_secret_change_me_please_1234}
      COOKIE_SAME_SITE: lax
      PASSWORD_RESET_TOKEN_EXPIRES_IN_MIN: 30
      AUTH_RATE_LIMIT_WINDOW_MIN: 15
      AUTH_RATE_LIMIT_MAX: 10
    ports:
      - '4000:4000'
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres_data:
